<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bc8cff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer shield -->
  <path d="M32 4 L54 12 L54 28 Q54 44 32 60 Q10 44 10 28 L10 12 Z" 
        fill="url(#shieldGradient)" 
        filter="url(#glow)"
        opacity="0.9"/>
  
  <!-- Inner shield border -->
  <path d="M32 8 L50 14.5 L50 28 Q50 42 32 56 Q14 42 14 28 L14 14.5 Z" 
        fill="none" 
        stroke="#ffffff" 
        stroke-width="0.5"
        opacity="0.3"/>
  
  <!-- Checkmark -->
  <path d="M24 32 L29 38 L40 24" 
        stroke="#ffffff" 
        stroke-width="3.5" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        fill="none"/>
  
  <!-- Circuit lines (decorative) -->
  <circle cx="20" cy="22" r="1.5" fill="#ffffff" opacity="0.4"/>
  <circle cx="44" cy="22" r="1.5" fill="#ffffff" opacity="0.4"/>
  <circle cx="32" cy="48" r="1.5" fill="#ffffff" opacity="0.4"/>
  <line x1="20" y1="22" x2="26" y2="28" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
  <line x1="44" y1="22" x2="38" y2="28" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
</svg>
